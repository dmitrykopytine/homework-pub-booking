<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Haymarket Tap — Edinburgh event</title>
  <style>
    body { font-family: Georgia, serif; margin: 2rem; color: #1a1a1a; }
    h1 { color: #2c5282; }
    dl { display: grid; grid-template-columns: 8rem 1fr; gap: 0.4rem 1rem; }
    dt { font-weight: bold; }
    section { margin-top: 1.5rem; }
  </style>
</head>
<body>
  <article>
    <h1 data-testid="title">Edinburgh Pub Event — Haymarket Tap</h1>
    <section>
      <h2>Event details</h2>
      <dl>
        <dt>Venue</dt><dd data-testid="venue_name">Haymarket Tap</dd>
        <dt>Address</dt><dd data-testid="venue_address">12 Dalry Rd, Edinburgh EH11 2BG</dd>
        <dt>Date</dt><dd data-testid="date">2026-04-25</dd>
        <dt>Time</dt><dd data-testid="time">19:30</dd>
        <dt>Party</dt><dd data-testid="party_size">6</dd>
      </dl>
    </section>
    <section>
      <h2>Weather</h2>
      <p>
        <span data-testid="condition">cloudy</span>,
        <span data-testid="temperature">12C</span>
      </p>
    </section>
    <section>
      <h2>Cost</h2>
      <dl>
        <dt>Total</dt><dd data-testid="total">£540</dd>
        <dt>Deposit</dt><dd data-testid="deposit">£0</dd>
      </dl>
      <p data-testid="deposit_note">No deposit required for this booking.</p>
    </section>
  </article>
</body>
</html>
